<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Jaloliddin 3 jang o‘yini</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="title">Jaloliddin Manguberdi — Strategiya o‘yini</div>
<button id="restartBtn">Qayta boshlash</button>
</header>

<div class="game">

<div class="team" id="team1">
<h2>1-Jamoa</h2>

<div class="map">
<img id="map1">
</div>

<div class="question">
<span id="qnum1"></span>
<p id="qtext1"></p>
</div>

<div class="answers" id="answers1"></div>

<div class="score">Ball: <span id="score1">0</span></div>

</div>


<div class="team" id="team2">
<h2>2-Jamoa</h2>

<div class="map">
<img id="map2">
</div>

<div class="question">
<span id="qnum2"></span>
<p id="qtext2"></p>
</div>

<div class="answers" id="answers2"></div>

<div class="score">Ball: <span id="score2">0</span></div>

</div>

</div>

<div id="announcement"></div>

<audio id="bgmusic" src="audio/guitar-loop.mp3" loop></audio>
<audio id="sound"></audio>

<script src="script.js"></script>

</body>
</html>
