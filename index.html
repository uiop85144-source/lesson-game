<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jaloliddin 3 jang o‘yini</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #120b07;
    color: white;
  }
  body { user-select: none; }

  .app {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: 62px 68px 1fr;
    background: linear-gradient(180deg, #2a170d 0%, #120b07 100%);
  }

  .control-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  padding: 8px 14px;
  background: #2d1a10;
  border-bottom: 2px solid rgba(255,255,255,.08);
}
.top-team-label {
  text-align: center;
  font-size: 28px;
  font-weight: 1000;
  color: #fff8e7;
}

.team-head {
  text-align: center;
  font-size: 22px;
  font-weight: 1000;
  line-height: 1.15;
  color: #fff8e7;
  padding: 0 8px;
}
  .control-side {
    display: flex;
    align-items: center;
  }

  .control-side:first-child {
    justify-content: flex-start;
  }

  .control-side:last-child {
    justify-content: flex-end;
  }

  .team-top-label {
    font-size: 22px;
    font-weight: 900;
    color: #fff3cf;
  }

  .restart-btn {
    border: none;
    border-radius: 14px;
    background: #f59e0b;
    color: #18110b;
    font-size: 20px;
    font-weight: 900;
    padding: 10px 22px;
    cursor: pointer;
  }

  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    background: #4a2d1a;
    border-bottom: 2px solid rgba(255,255,255,.08);
    padding: 8px 14px;
  }

  .team-head {
    text-align: center;
    font-size: 22px;
    font-weight: 900;
  }

  .center-box {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .timer-box, .room-box {
    background: rgba(255,255,255,.09);
    border-radius: 16px;
    padding: 8px 18px;
    font-size: 28px;
    font-weight: 1000;
    color: #fff2bd;
    min-width: 160px;
    text-align: center;
  }

  .boards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    min-height: 0;
  }

  .board {
    min-height: 0;
    display: grid;
    grid-template-rows: 1fr 230px 58px;
    background: #20130d;
    border: 3px solid #6e4a2d;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 12px 28px rgba(0,0,0,.35);
    position: relative;
  }

  .map-area {
    position: relative;
    overflow: hidden;
    background: #0e0e0e;
  }

  .map-area img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #0f0f0f;
  }

  .question-bar {
    position: absolute;
    left: 14px;
    right: 14px;
    top: 12px;
    background: rgba(24,16,11,.86);
    border: 2px solid rgba(255,255,255,.14);
    border-radius: 18px;
    padding: 12px 16px;
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    line-height: 1.18;
    color: #fff8e7;
    box-shadow: 0 8px 18px rgba(0,0,0,.25);
  }

  .map-badges {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 12px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .badge {
    background: rgba(24,16,11,.84);
    border: 2px solid rgba(255,255,255,.12);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 19px;
    font-weight: 900;
  }

  .flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(circle at center, rgba(255,214,102,.42) 0%, rgba(255,214,102,.15) 18%, rgba(255,214,102,0) 45%);
  }

  .flash.active { animation: flashPulse 1s ease; }

  @keyframes flashPulse {
    0% { opacity: 0; transform: scale(.92); }
    35% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.08); }
  }

  .scene-icon {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 30px;
    font-weight: 700;
    color: white;
    background: rgba(0,0,0,.45);
    border: 2px solid rgba(255,255,255,.45);
    opacity: 0;
    transform: scale(.75);
  }

  .scene-icon.show { animation: popIn .8s ease forwards; }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(.75); }
    60% { opacity: 1; transform: scale(1.08); }
    100% { opacity: .95; transform: scale(1); }
  }

  .icon-j { left: 18%; top: 56%; background: rgba(20,84,35,.58); }
  .icon-c { left: 46%; top: 44%; background: rgba(146,64,14,.58); }
  .icon-m { right: 17%; top: 50%; background: rgba(127,29,29,.58); }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    background: #2a1a12;
  }

  .opt {
    border: none;
    border-radius: 18px;
    cursor: pointer;
    color: white;
    background: linear-gradient(180deg,#6b4428,#4a2f1d);
    font-size: 22px;
    font-weight: 800;
    padding: 10px 14px;
    line-height: 1.2;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.08);
    transition: transform .12s ease, filter .12s ease;
  }

  .opt.selected {
    box-shadow: inset 0 0 0 4px #ffe08a, 0 0 0 2px rgba(255,224,138,.35);
    transform: scale(.99);
  }

  .opt.correct { background: linear-gradient(180deg,#1f8a46,#166534); }
  .opt.wrong { background: linear-gradient(180deg,#b43a2f,#7f1d1d); }
  .opt.dim { filter: brightness(.72); }
  .opt:disabled { cursor: default; }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px 12px;
    font-size: 23px;
    font-weight: 900;
    color: #fff6dd;
    background: #4a2d1a;
    border-top: 2px solid rgba(255,255,255,.08);
  }

  .team-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(16,10,7,.45);
    pointer-events: none;
  }

  .team-overlay.show { display: flex; }

  .team-overlay-text {
    width: 92%;
    text-align: center;
    background: rgba(24,16,11,.88);
    border: 3px solid rgba(255,255,255,.18);
    border-radius: 26px;
    padding: 18px 18px 14px;
    box-shadow: 0 16px 30px rgba(0,0,0,.3);
  }

  .big-en {
    font-size: 44px;
    font-weight: 1000;
    letter-spacing: 1px;
  }

  .big-uz {
    font-size: 24px;
    font-weight: 800;
    margin-top: 10px;
    color: #fff2c8;
  }

  .round-overlay,
  .room-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: rgba(7,4,2,.45);
  }

  .round-overlay.show,
  .room-overlay.show { display: flex; }

  .round-box,
  .room-box-card {
    width: min(92vw, 1450px);
    background: rgba(26,18,12,.97);
    border: 3px solid rgba(255,255,255,.18);
    border-radius: 28px;
    padding: 22px;
    text-align: center;
    box-shadow: 0 22px 40px rgba(0,0,0,.42);
  }

  .round-correct {
    font-size: 34px;
    font-weight: 1000;
    color: #ffe6a3;
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .round-teams {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .round-team {
    background: rgba(255,255,255,.06);
    border-radius: 20px;
    padding: 18px;
  }

  .round-team-name {
    font-size: 28px;
    font-weight: 1000;
    margin-bottom: 10px;
  }

  .round-team-main {
    font-size: 38px;
    font-weight: 1000;
  }

  .round-team-sub {
    margin-top: 8px;
    font-size: 22px;
    color: #fff3c9;
  }

  .room-title {
    font-size: 72px;
    font-weight: 1000;
    color: #ffe6a3;
    margin-bottom: 14px;
  }

  .room-sub {
    font-size: 40px;
    font-weight: 900;
    color: #fff8e7;
  }

  .final {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: #120d08;
    z-index: 30;
  }

  .final.show { display: flex; }

  .final-box {
    width: min(1100px,92vw);
    text-align: center;
  }

  .final-title {
    font-size: 56px;
    font-weight: 1000;
    margin-bottom: 24px;
  }

  .final-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .final-card {
    background: #2a1c12;
    border: 3px solid #6c4a2b;
    border-radius: 22px;
    padding: 28px;
  }

  .final-card h2 {
    font-size: 40px;
    margin: 0 0 16px;
  }

  .final-score {
    font-size: 78px;
    font-weight: 1000;
  }

  .final-sub {
    font-size: 28px;
    margin-top: 8px;
  }

  .pwd-modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.72);
    z-index: 1200;
  }

  .pwd-modal.show { display: flex; }

  .pwd-box {
    width: min(460px,88vw);
    background: #2b1b12;
    border: 3px solid #7a5432;
    border-radius: 22px;
    padding: 26px;
    box-shadow: 0 18px 40px rgba(0,0,0,.35);
    text-align: center;
  }

  .pwd-title {
    font-size: 34px;
    font-weight: 1000;
    margin-bottom: 12px;
  }

  .pwd-sub {
    font-size: 18px;
    color: #ffe7be;
    margin-bottom: 18px;
  }

  .pwd-input {
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    border: 2px solid #b17a41;
    background: #140d08;
    color: white;
    font-size: 24px;
    text-align: center;
    outline: none;
    letter-spacing: 3px;
  }

  .pwd-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 18px;
  }

  .pwd-btn {
    border: none;
    border-radius: 14px;
    padding: 14px 22px;
    cursor: pointer;
    font-size: 20px;
    font-weight: 900;
  }

  .pwd-ok { background: #f59e0b; color: #1b120b; }
  .pwd-cancel { background: #4a2f1d; color: white; }

  .pwd-error {
    min-height: 26px;
    margin-top: 12px;
    font-size: 18px;
    color: #ffd2d2;
  }

  @media (max-width: 1280px) {
    .question-bar { font-size: 20px; }
    .opt { font-size: 18px; }
    .team-head { font-size: 20px; }
    .team-top-label { font-size: 20px; }
    .badge { font-size: 18px; }
    .bottom { font-size: 18px; }
    .big-en { font-size: 34px; }
    .big-uz { font-size: 20px; }
    .room-title { font-size: 42px; }
    .room-sub { font-size: 24px; }
.top-team-label { font-size: 22px; }
.team-head { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="control-row">
  <div class="top-team-label">1-jamoa</div>
  <button class="restart-btn" onclick="guardedRestart()">Qayta boshlash</button>
  <div class="top-team-label">2-jamoa</div>
</div>

  <div class="header">
  <div class="team-head" id="headerQuestionLeft">Savol 1</div>
  <div class="center-box">
    <div class="room-box" id="roomLabel">1-xona</div>
    <div class="timer-box" id="roundTimer">30</div>
  </div>
  <div class="team-head" id="headerQuestionRight">Savol 1</div>
</div>

  <div class="boards">
    <div class="board" id="board1"></div>
    <div class="board" id="board2"></div>
  </div>
</div>

<div class="round-overlay" id="roundOverlay">
  <div class="round-box">
    <div class="round-correct" id="roundCorrect"></div>
    <div class="round-teams">
      <div class="round-team">
        <div class="round-team-name">1-jamoa</div>
        <div class="round-team-main" id="roundTeam1Main"></div>
        <div class="round-team-sub" id="roundTeam1Sub"></div>
      </div>
      <div class="round-team">
        <div class="round-team-name">2-jamoa</div>
        <div class="round-team-main" id="roundTeam2Main"></div>
        <div class="round-team-sub" id="roundTeam2Sub"></div>
      </div>
    </div>
  </div>
</div>

<div class="room-overlay" id="roomOverlay">
  <div class="room-box-card">
    <div class="room-title" id="roomOverlayTitle"></div>
    <div class="room-sub" id="roomOverlaySub"></div>
  </div>
</div>

<div class="final" id="finalScreen">
  <div class="final-box">
    <div class="final-title">Natija</div>
    <div class="final-grid">
      <div class="final-card">
        <h2>1-jamoa</h2>
        <div class="final-score" id="final1">0.0</div>
        <div class="final-sub">10 balldan</div>
      </div>
      <div class="final-card">
        <h2>2-jamoa</h2>
        <div class="final-score" id="final2">0.0</div>
        <div class="final-sub">10 balldan</div>
      </div>
    </div>
  </div>
</div>

<div class="pwd-modal" id="pwdModal">
  <div class="pwd-box">
    <div class="pwd-title">Qayta boshlash</div>
    <div class="pwd-sub">Admin kodini kiriting</div>
    <input class="pwd-input" id="pwdInput" type="password" inputmode="text" autocomplete="off" />
    <div class="pwd-error" id="pwdError"></div>
    <div class="pwd-row">
      <button class="pwd-btn pwd-ok" id="pwdSubmit">Tasdiqlash</button>
      <button class="pwd-btn pwd-cancel" id="pwdCancel">Bekor qilish</button>
    </div>
  </div>
</div>

<audio id="audioApplause" preload="auto" src="audio/applause.mp3"></audio>
<audio id="audioBingo" preload="auto" src="audio/game-bonus.mp3"></audio>
<audio id="audioVictory" preload="auto" src="audio/victory-male.mp3"></audio>
<audio id="audioChicken" preload="auto" src="audio/you-win.mp3"></audio>
<audio id="audioTryAgain" preload="auto" src="audio/try-again.mp3"></audio>
<audio id="audioTimeOver" preload="auto" src="audio/time-over.mp3"></audio>
<audio id="audioFinal" preload="auto" src="audio/failure.mp3"></audio>

<script>
const ROOMS = [
  {
    key: "niso",
    title: "1-xona — Niso jangi",
    intro: "Niso bosqichi boshlanmoqda",
    questions: [
      { q:"Savol 1. Niso atrofida Jaloliddinning eng muhim maqsadi qaysi edi?", correct:"Qo‘shinni saqlab, xavfli yo‘ldan tez chiqish.", wrong:["Asosiy kuch kelguncha bir joyda uzoq kutish.","Maydonni tark etmay, qamalni cho‘zib yuborish.","Faqat dushman bayrog‘ini qo‘lga kiritishni ko‘zlash."] },
      { q:"Savol 2. Niso oldida kichik dushman to‘sig‘iga duch kelinsa, qaysi usul foydaliroq?", correct:"Qisqa va aniq zarba bilan yo‘lni ochish.", wrong:["Harakatni to‘xtatib, uzoq kengash bilan vaqt o‘tkazish.","Qo‘shinni bo‘lib, hamma tomonga yoyib yuborish.","Asosiy yo‘ldan chiqib, maqsadsiz aylanib yurish."] },
      { q:"Savol 3. Niso voqealarida vaqtni boy bermaslik nega muhim edi?", correct:"Chunki kechikish dushmanga kuch yig‘ish imkonini beradi.", wrong:["Chunki uzoq kutish askarni avtomatik kuchaytiradi.","Chunki qanchalik sekin yurilsa, yo‘l shunchalik xavfsiz bo‘ladi.","Chunki faqat tun tushganda hujum qilish mumkin bo‘ladi."] },
      { q:"Savol 4. Niso yo‘lida to‘g‘ri qaror nimani saqlab qoladi?", correct:"Ham yurish tezligini, ham qo‘shin tartibini.", wrong:["Faqat shon-shuhratni, ammo askarni emas.","Faqat bayroqni, lekin yo‘lni emas.","Faqat jang maydonini, lekin yurish maqsadini emas."] },
      { q:"Savol 5. Niso atrofidagi qarorlarda qaysi fikr to‘g‘ri?", correct:"Har bir to‘qnashuvni uzoq jangga aylantirish shart emas.", wrong:["Faqat eng katta janggina g‘alaba olib keladi.","Har safar orqaga qaytish eng xavfsiz yo‘ldir.","Kichik to‘siq ko‘rilsa, maqsadni o‘zgartirish kerak bo‘ladi."] },
      { q:"Savol 6. Niso voqeasi Jaloliddin kuchining nimada ekanini ko‘rsatadi?", correct:"Tez baholash va aniq qaror chiqarishda.", wrong:["Faqat son jihatdan ustun qo‘shin yig‘ishda.","Faqat uzun qamalga chidashda.","Faqat dushmanni ortga quvishda."] }
    ]
  },
  {
    key: "valiyon",
    title: "2-xona — Valiyon jangi",
    intro: "Valiyon bosqichi boshlanmoqda",
    questions: [
      { q:"Savol 7. Valiyon tomonidagi jangda qaysi maydon himoya uchun qulayroq?", correct:"Balandroq va ko‘rinish keng bo‘lgan joy.", wrong:["Ko‘rinishi yopiq, past va tor botqoqli joy.","Faqat daryo ichidagi harakatsiz nuqta.","Dushmanga eng yaqin, lekin ochiq qoladigan tekis joy."] },
      { q:"Savol 8. Valiyon voqealarida sabr nega foydali bo‘lishi mumkin?", correct:"Chunki shoshgan dushman xato qilishi ehtimoli ortadi.", wrong:["Chunki uzoq kutish har safar dushmanni qo‘rqitadi.","Chunki sabr qilinsa, jang bo‘lmay qoladi.","Chunki faqat eng oxirgi daqiqada qaror qilish kerak bo‘ladi."] },
      { q:"Savol 9. Valiyon atrofida dushmanni chalg‘itish nimaga xizmat qiladi?", correct:"Vaqt yutish va o‘z tartibini saqlab qolishga.", wrong:["Maydonni bo‘sh qoldirib, yo‘lni dushmanga berishga.","Askarning joyini tez-tez almashtirib charchatishga.","Faqat shovqin ko‘paytirib, rejasizlik yaratishga."] },
      { q:"Savol 10. Valiyon jangida birlikning eng katta foydasi nimada?", correct:"Qo‘shin bir-birini qo‘llab, tartibli harakat qiladi.", wrong:["Faqat tez yugurish uchun keng maydon ochiladi.","Har kim alohida jang qilsa, kuch ortadi.","Qaror bir emas, ko‘p markazdan chiqsa yaxshiroq bo‘ladi."] },
      { q:"Savol 11. Baland joydan qarashning asosiy foydasi qaysi?", correct:"Dushman harakati ertaroq ko‘rinadi va tayyorlanish osonlashadi.", wrong:["Faqat bayroq uzoqdan yaxshi ko‘rinadi.","Otlar baland joyda har doim tezroq yuguradi.","U yerda jang qilinmasa ham g‘alaba yoziladi."] },
      { q:"Savol 12. Valiyon voqealarida eng yaxshi himoya qarori qaysi?", correct:"Joyni to‘g‘ri tanlab, shoshmasdan tartibni saqlash.", wrong:["Darhol ochiq maydonga tushib, xavfni oshirish.","Qarorni kechiktirib, hech kimga vazifa bermaslik.","Faqat bir yo‘nalishga qarab, qolgan tomonni unutish."] },
      { q:"Savol 13. Valiyon atrofidagi kurashda qaysi fikr eng mantiqli?", correct:"Faqat kuch emas, kuzatuv va joy tanlash ham muhim.", wrong:["Faqat oldinga yurish bo‘lsa, qolgan omillar kerak emas.","Faqat qalin saf bo‘lsa, maydon farq qilmaydi.","Faqat dushman soni hal qiluvchi omil bo‘lib qoladi."] }
    ]
  },
  {
    key: "parvon",
    title: "3-xona — Parvon jangi",
    intro: "Parvon bosqichi boshlanmoqda",
    questions: [
      { q:"Savol 14. Parvon jangida tor hudud Jaloliddinga qanday foyda berdi?", correct:"Dushmanning erkin harakatini cheklab qo‘ydi.", wrong:["O‘z qo‘shinining ko‘rish doirasini butunlay yopdi.","Hujumni to‘xtatib, faqat chekinishga majbur qildi.","Faqat suvga yaqinlashish uchun qulaylik yaratdi."] },
      { q:"Savol 15. Parvon jangida yer tanlash nega muhim bo‘ldi?", correct:"Chunki qulay joy kuchni to‘g‘ri ishlatishga yordam beradi.", wrong:["Chunki faqat chiroyli joy askarni ruhlantiradi.","Chunki yer tanlash bo‘lmasa ham natija o‘zgarmaydi.","Chunki tor joyda doim jang to‘xtab qoladi."] },
      { q:"Savol 16. Parvonda sabr bilan jang qilish nimaga xizmat qiladi?", correct:"Dushman charchashini kutib, o‘z navbatini to‘g‘ri topishga.", wrong:["Hujumni butunlay unutib, faqat yashirinib turishga.","Jangni maqsadsiz cho‘zib, askarni holdan toydirishga.","Faqat vaqt tugashini kutib, qarorsiz qolishga."] },
      { q:"Savol 17. Dushmanning aldov harakati sezilsa, eng to‘g‘ri yo‘l qaysi?", correct:"Darhol ishonmay, avval tekshirib ko‘rish.", wrong:["Hech o‘ylamasdan butun kuch bilan quvib ketish.","Barcha safni buzib, har tomonga tarqalib ketish.","Faqat bitta xabarga qarab yakuniy qaror chiqarish."] },
      { q:"Savol 18. Parvon jangidan keyingi eng to‘g‘ri ish qaysi bo‘ladi?", correct:"G‘alabadan so‘ng ham tartib va birlikni saqlash.", wrong:["Har kim o‘ljani o‘zi xohlagandek bo‘lib olish.","Natijani kutmay, darhol safni tarqatib yuborish.","Qarorlarni keyinga qoldirib, boshqaruvni bo‘shatish."] },
      { q:"Savol 19. Parvon voqeasida Jaloliddinning ustunligi ko‘proq nimada ko‘rindi?", correct:"To‘g‘ri joy, sabr va aniq boshqaruvni birlashtirishda.", wrong:["Faqat ko‘p askar bilan maydonni to‘ldirishda.","Faqat dushmanni ko‘rmay turib hujum boshlashda.","Faqat tezlikni oshirib, tartibni unutishda."] },
      { q:"Savol 20. Uch jangni birga qaraganda eng muhim xulosa qaysi?", correct:"G‘alaba ko‘pincha tez fikr, tartib va to‘g‘ri strategiya bilan keladi.", wrong:["G‘alaba faqat eng uzun jangda qo‘lga kiradi.","G‘alaba uchun bir xil usulni har joyda qo‘llash yetadi.","G‘alabada maydon va vaqt omili katta ahamiyatga ega emas."] }
    ]
  }
];

const MAPS = {
  niso: "images/niso.png",
  valiyon: "images/valiyon.png",
  parvon: "images/parvon.png"
};

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function battleLabel(key) {
  if (key === "niso") return "Niso";
  if (key === "valiyon") return "Valiyon";
  return "Parvon";
}

function roomShortTitle(index) {
  return `${index + 1}-xona`;
}

function makeOptions(q) {
  return shuffleArray([
    { text: q.correct, correct: true },
    ...q.wrong.map(t => ({ text: t, correct: false }))
  ]);
}

function createBoard(rootId, teamName) {
  const root = document.getElementById(rootId);
  root.innerHTML = `
    <div class="map-area">
      <img id="${rootId}_map" alt="Jang xaritasi">
      <div class="flash" id="${rootId}_flash"></div>
      <div class="scene-icon icon-j" id="${rootId}_j">🛡</div>
      <div class="scene-icon icon-c" id="${rootId}_c">⚔</div>
      <div class="scene-icon icon-m" id="${rootId}_m">🏇</div>
      <div class="question-bar" id="${rootId}_question"></div>
      <div class="map-badges">
        <div class="badge">${teamName}</div>
        <div class="badge" id="${rootId}_score">0.0 / 10</div>
      </div>
      <div class="team-overlay" id="${rootId}_overlay">
        <div class="team-overlay-text">
          <div class="big-en" id="${rootId}_overlayEn"></div>
          <div class="big-uz" id="${rootId}_overlayUz"></div>
        </div>
      </div>
    </div>
    <div class="options" id="${rootId}_options"></div>
    <div class="bottom" id="${rootId}_bottom">Javobni tanlang</div>
  `;
  return {
    rootId,
    teamName,
    score: 0,
    selectedIndex: null,
    selectedCorrect: false,
    selectedAt: null,
    options: [],
    renderQuestion(q, battleKey) {
      this.selectedIndex = null;
      this.selectedCorrect = false;
      this.selectedAt = null;
      this.options = makeOptions(q);
      document.getElementById(`${rootId}_map`).src = MAPS[battleKey];
      document.getElementById(`${rootId}_bottom`).textContent = `${battleLabel(battleKey)} jangi`;
      document.getElementById(`${rootId}_overlay`).classList.remove("show");
      this.showScene();
      const box = document.getElementById(`${rootId}_options`);
      box.innerHTML = "";
      this.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "opt";
        btn.textContent = opt.text;
        btn.onclick = () => answerForBoard(this, idx);
        box.appendChild(btn);
      });
    },
    showScene() {
      const flash = document.getElementById(`${rootId}_flash`);
      const j = document.getElementById(`${rootId}_j`);
      const c = document.getElementById(`${rootId}_c`);
      const m = document.getElementById(`${rootId}_m`);
      flash.classList.remove("active");
      [j,c,m].forEach(el => el.classList.remove("show"));
      void flash.offsetWidth;
      flash.classList.add("active");
      setTimeout(() => j.classList.add("show"), 120);
      setTimeout(() => c.classList.add("show"), 300);
      setTimeout(() => m.classList.add("show"), 500);
    },
    markSelected(idx) {
      const btns = [...document.querySelectorAll(`#${rootId}_options .opt`)];
      btns.forEach((b, i) => {
        b.disabled = true;
        if (i === idx) b.classList.add("selected");
      });
    },
    waitMessage(waiting) {
      document.getElementById(`${rootId}_bottom`).textContent =
        waiting ? `${this === board1 ? "2" : "1"}-jamoani kuting` : "Javobni tanlang";
    },
    reveal(correctText, result) {
      const btns = [...document.querySelectorAll(`#${rootId}_options .opt`)];
      btns.forEach((b, i) => {
        const opt = this.options[i];
        b.disabled = true;
        if (opt.correct) b.classList.add("correct");
        else if (this.selectedIndex === i && !opt.correct) b.classList.add("wrong");
        else b.classList.add("dim");
      });
      document.getElementById(`${rootId}_bottom`).textContent = `To‘g‘ri javob: ${correctText}`;
      document.getElementById(`${rootId}_overlayEn`).textContent = result.en;
      document.getElementById(`${rootId}_overlayUz`).textContent = result.uz;
      document.getElementById(`${rootId}_overlay`).classList.add("show");
    },
    updateScore() {
      document.getElementById(`${rootId}_score`).textContent = `${this.score.toFixed(1)} / 10`;
    }
  };
}

const board1 = createBoard("board1", "1-jamoa");
const board2 = createBoard("board2", "2-jamoa");

const state = {
  roomIndex: 0,
  questionIndexInRoom: 0,
  roundTime: 30,
  timer: null,
  revealPending: false,
  running: true
};

function currentRoom() {
  return ROOMS[state.roomIndex];
}

function currentQuestion() {
  return currentRoom().questions[state.questionIndexInRoom];
}

function totalQuestionNumber() {
  let total = 0;
  for (let i = 0; i < state.roomIndex; i++) total += ROOMS[i].questions.length;
  return total + state.questionIndexInRoom + 1;
}

function stopAllAudio(includeApplause = true) {
  const ids = [
    "audioBingo",
    "audioVictory",
    "audioChicken",
    "audioTryAgain",
    "audioTimeOver",
    "audioFinal"
  ];
  if (includeApplause) ids.push("audioApplause");
  ids.forEach(id => {
    const a = document.getElementById(id);
    if (!a) return;
    a.pause();
    a.currentTime = 0;
  });
}

function playSound(type) {
  if (type === "applause") {
    const applause = document.getElementById("audioApplause");
    if (!applause) return;
    applause.pause();
    applause.currentTime = 0;
    const p = applause.play();
    if (p && typeof p.catch === "function") p.catch(() => {});
    return;
  }

  stopAllAudio(false);

  let id = "audioVictory";
  if (type === "win-fast") id = "audioBingo";
  else if (type === "chicken") id = "audioChicken";
  else if (type === "lose") id = "audioTryAgain";
  else if (type === "time-over") id = "audioTimeOver";
  else if (type === "final") id = "audioFinal";

  const a = document.getElementById(id);
  if (!a) return;
  a.currentTime = 0;
  const p = a.play();
  if (p && typeof p.catch === "function") p.catch(() => {});
}

function updateRoundTimer() {
  document.getElementById("roundTimer").textContent = String(state.roundTime).padStart(2, "0");
}

function updateRoomLabel() {
  document.getElementById("roomLabel").textContent = roomShortTitle(state.roomIndex);
}
function updateHeaderQuestions(qText) {
  document.getElementById("headerQuestionLeft").textContent = qText;
  document.getElementById("headerQuestionRight").textContent = qText;
}

function showRoomTransition(title, sub, nextAction) {
  const overlay = document.getElementById("roomOverlay");
  const titleEl = document.getElementById("roomOverlayTitle");
  const subEl = document.getElementById("roomOverlaySub");

  titleEl.textContent = title;
  subEl.textContent = `👏 ${sub} 👏`;

  overlay.classList.add("show");
  playSound("applause");

  setTimeout(() => {
    overlay.classList.remove("show");
    stopAllAudio(true);
    if (nextAction) nextAction();
  }, 4800);
}

function showFinalTransition() {
  const overlay = document.getElementById("roomOverlay");
  const titleEl = document.getElementById("roomOverlayTitle");
  const subEl = document.getElementById("roomOverlaySub");

  titleEl.textContent = "3-XONA TUGADI";
  subEl.textContent = "👏 PARVON JANGI YAKUNLANDI 👏";

  overlay.classList.add("show");
  playSound("applause");

  setTimeout(() => {
    overlay.classList.remove("show");
    stopAllAudio(true);
    finishGame();
  }, 5200);
}

function guardedRestart() {
  const modal = document.getElementById("pwdModal");
  const input = document.getElementById("pwdInput");
  const error = document.getElementById("pwdError");
  error.textContent = "";
  input.value = "";
  modal.classList.add("show");
  setTimeout(() => input.focus(), 50);
}

function closePwdModal() {
  document.getElementById("pwdModal").classList.remove("show");
  document.getElementById("pwdError").textContent = "";
  document.getElementById("pwdInput").value = "";
}

function submitPwd() {
  const input = document.getElementById("pwdInput");
  const error = document.getElementById("pwdError");
  if (input.value === "admin") {
    closePwdModal();
    restartGame();
  } else {
    error.textContent = "Kod noto‘g‘ri";
    input.value = "";
    input.focus();
  }
}

document.getElementById("pwdSubmit").onclick = submitPwd;
document.getElementById("pwdCancel").onclick = closePwdModal;
document.getElementById("pwdModal").addEventListener("click", e => {
  if (e.target.id === "pwdModal") closePwdModal();
});
document.getElementById("pwdInput").addEventListener("keydown", e => {
  if (e.key === "Enter") submitPwd();
  if (e.key === "Escape") closePwdModal();
});

function restartGame() {
  stopAllAudio(true);
  clearInterval(state.timer);

  state.roomIndex = 0;
  state.questionIndexInRoom = 0;
  state.roundTime = 30;
  state.revealPending = false;
  state.running = true;

  board1.score = 0;
  board2.score = 0;
  board1.updateScore();
  board2.updateScore();

  document.getElementById("finalScreen").classList.remove("show");
  document.getElementById("roundOverlay").classList.remove("show");
  document.getElementById("roomOverlay").classList.remove("show");

  updateRoomLabel();
  showRoomTransition("1-XONA", "NISO BOSQICHI BOSHLANMOQDA", startRound);
}

function answerForBoard(board, idx) {
  if (!state.running || state.revealPending) return;
  if (board.selectedIndex !== null) return;

  board.selectedIndex = idx;
  board.selectedCorrect = !!board.options[idx].correct;
  board.selectedAt = 30 - state.roundTime;
  board.markSelected(idx);

  const other = board === board1 ? board2 : board1;
  board.waitMessage(true);
  other.waitMessage(other.selectedIndex !== null);

  if (board1.selectedIndex !== null && board2.selectedIndex !== null) {
    state.revealPending = true;
    state.roundTime = 5;
    updateRoundTimer();
  }
}

function startRound() {
  if (!state.running) return;
  const room = currentRoom();
  const q = currentQuestion();

  state.revealPending = false;
  state.roundTime = 30;
  updateRoundTimer();
  updateRoomLabel();

  const qText = q.q.replace(/^Savol\s+\d+\.\s*/i, `Savol ${totalQuestionNumber()}. `);
  updateHeaderQuestions(qText);

  board1.renderQuestion({ ...q, q: qText }, room.key);
  board2.renderQuestion({ ...q, q: qText }, room.key);
  board1.waitMessage(false);
  board2.waitMessage(false);

  clearInterval(state.timer);
  state.timer = setInterval(tick, 1000);
}

function tick() {
  if (!state.running) return;
  state.roundTime--;
  updateRoundTimer();
  if (state.roundTime <= 0) {
    clearInterval(state.timer);
    revealRound();
  }
}

function resultForBoard(board, other) {
  if (!board.selectedCorrect) {
    return { en: "TRY AGAIN", uz: "Qayta urinib ko‘ring" };
  }
  if (board.selectedAt !== null && board.selectedAt <= 5) {
    return { en: "BINGO BANGO BONGO!", uz: "Siz juda tez to‘g‘ri topdingiz" };
  }
  if (other.selectedIndex !== null && !other.selectedCorrect) {
    return { en: "WINNER WINNER CHICKEN DINNER!", uz: "Siz raqib xatosidan foydalandingiz" };
  }
  return { en: "VICTORY!", uz: "G‘alaba qildingiz" };
}

function revealRound() {
  state.revealPending = false;
  const q = currentQuestion();
  const correctText = q.correct;

  if (board1.selectedCorrect) board1.score += 0.5;
  if (board2.selectedCorrect) board2.score += 0.5;
  board1.updateScore();
  board2.updateScore();

  let r1 = resultForBoard(board1, board2);
  let r2 = resultForBoard(board2, board1);

  if (board1.selectedCorrect && board2.selectedCorrect) {
    if (board1.selectedAt <= board2.selectedAt) {
      r1 = board1.selectedAt <= 5
        ? { en: "BINGO BANGO BONGO!", uz: "Siz juda tez to‘g‘ri topdingiz" }
        : { en: "VICTORY!", uz: "G‘alaba qildingiz" };
      r2 = { en: "WINNER WINNER CHICKEN DINNER!", uz: "Siz ham to‘g‘ri javob berdingiz" };
    } else {
      r2 = board2.selectedAt <= 5
        ? { en: "BINGO BANGO BONGO!", uz: "Siz juda tez to‘g‘ri topdingiz" }
        : { en: "VICTORY!", uz: "G‘alaba qildingiz" };
      r1 = { en: "WINNER WINNER CHICKEN DINNER!", uz: "Siz ham to‘g‘ri javob berdingiz" };
    }
  }

  board1.reveal(correctText, r1);
  board2.reveal(correctText, r2);

  const chosenSound =
    (board1.selectedIndex === null && board2.selectedIndex === null)
      ? "time-over"
      : (board1.selectedCorrect && board2.selectedCorrect)
        ? (r1.en.includes("BINGO") || r2.en.includes("BINGO") ? "win-fast" : "win")
        : (!board1.selectedCorrect && !board2.selectedCorrect)
          ? "lose"
          : ((r1.en.includes("BINGO") || r2.en.includes("BINGO")) ? "win-fast" :
             (r1.en.includes("CHICKEN") || r2.en.includes("CHICKEN")) ? "chicken" : "win");

  playSound(chosenSound);

  document.getElementById("roundCorrect").textContent = `To‘g‘ri javob: ${correctText}`;
  document.getElementById("roundTeam1Main").textContent = r1.en;
  document.getElementById("roundTeam1Sub").textContent = r1.uz;
  document.getElementById("roundTeam2Main").textContent = r2.en;
  document.getElementById("roundTeam2Sub").textContent = r2.uz;
  document.getElementById("roundOverlay").classList.add("show");

  setTimeout(() => {
    document.getElementById("roundOverlay").classList.remove("show");
    moveNext();
  }, 4300);
}

function moveNext() {
  const room = currentRoom();
  state.questionIndexInRoom++;

  if (state.questionIndexInRoom < room.questions.length) {
    startRound();
    return;
  }

  if (state.roomIndex < ROOMS.length - 1) {
    const finishedRoomTitle = currentRoom().title.toUpperCase();
    state.roomIndex++;
    state.questionIndexInRoom = 0;
    updateRoomLabel();

    const nextRoom = currentRoom();

    showRoomTransition(
      `${finishedRoomTitle} TUGADI`,
      `${nextRoom.title.toUpperCase()} BOSHLANMOQDA`,
      startRound
    );
    return;
  }

  showFinalTransition();
}

function finishGame() {
  clearInterval(state.timer);
  state.running = false;
  document.getElementById("final1").textContent = board1.score.toFixed(1);
  document.getElementById("final2").textContent = board2.score.toFixed(1);
  document.getElementById("finalScreen").classList.add("show");
  playSound("final");
}

restartGame();
</script>
